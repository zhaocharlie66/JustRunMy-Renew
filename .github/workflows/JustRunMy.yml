name: JustRunMy 自动续期 (Node.js版)

on:
  # 允许手动在 GitHub 网页端点击运行
  workflow_dispatch:
  # 定时任务：UTC时间 01:15 (对应北京时间早上 09:15) 每天执行
  schedule:
    - cron: '15 1 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🟢 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 使用 Node.js 18 或更高版本
          
      - name: 🛡️ 启动 Gost 代理转发 (可选)
        env:
          GOST_PROXY_TARGET: ${{ secrets.GOST_PROXY_TARGET }}
        run: |
          if [ -z "$GOST_PROXY_TARGET" ]; then
            echo "ℹ️ 未配置 GOST_PROXY_TARGET，将使用 GitHub Actions 本地网络直连。"
            echo "USE_PROXY=false" >> $GITHUB_ENV
          else
            wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
            gunzip gost-linux-amd64-2.11.5.gz
            chmod +x gost-linux-amd64-2.11.5
            mv gost-linux-amd64-2.11.5 gost
            echo "启动 Gost 转发隧道..."
            nohup ./gost -L http://:8080 -F $GOST_PROXY_TARGET > gost.log 2>&1 &
            sleep 3
            echo "测试本地代理连通性..."
            curl -x http://127.0.0.1:8080 https://api.ipify.org -v
            echo "USE_PROXY=true" >> $GITHUB_ENV
          fi
          
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            xdotool \
            scrot \
            fonts-noto-cjk
            
      - name: 📦 安装 Node.js 依赖 (Puppeteer等)
        run: |
          npm install
          
      - name: 🚀 运行 JS 续期脚本
        env:
          JUSTRUNMY_EMAIL: ${{ secrets.JUSTRUNMY_EMAIL }}
          JUSTRUNMY_PASSWORD: ${{ secrets.JUSTRUNMY_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 使用 xvfb 提供虚拟桌面环境，使 xdotool 能够正常工作并配合非无头模式的 Puppeteer
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            npm start
            
      - name: 📸 上传调试截图
        if: always() # 无论成功还是失败都上传截图
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
          
      - name: 🧹 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
